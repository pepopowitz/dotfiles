<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch Recap</title>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e7e5e4;
    --text: #1c1917;
    --text-muted: #78716c;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --red: #dc2626;
    --red-light: #fef2f2;
    --amber: #d97706;
    --amber-light: #fffbeb;
    --code-bg: #1e1e2e;
    --code-text: #cdd6f4;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", Menlo, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  /* — Header — */
  .header {
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .header-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .pill a {
    color: var(--accent);
    text-decoration: none;
  }
  .pill a:hover { text-decoration: underline; }

  /* — Section scaffolding — */
  section {
    margin-bottom: 48px;
  }
  section > h2 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* — Narrative (prose) — */
  .narrative p {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--text);
    max-width: 65ch;
  }

  /* — Decision cards — */
  .decisions-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .decision-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    border-left: 3px solid var(--accent);
  }
  .decision-card h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .decision-card p {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .decision-card .alt {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* — Learnings (mixed) — */
  .learnings-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .learning-quote {
    border-left: 3px solid var(--amber);
    background: var(--amber-light);
    padding: 16px 20px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 0.9rem;
  }
  .learning-insight {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    font-size: 0.9rem;
  }
  .learning-insight h3 {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .learning-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .learning-comparison .before,
  .learning-comparison .after {
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 0.8rem;
  }
  .learning-comparison .before {
    background: var(--red-light);
    border: 1px solid #fecaca;
  }
  .learning-comparison .after {
    background: var(--green-light);
    border: 1px solid #bbf7d0;
  }
  .learning-comparison .label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  /* — Timeline — */
  .timeline {
    position: relative;
    padding-left: 28px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 6px;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: var(--border);
  }
  .timeline-phase {
    position: relative;
    margin-bottom: 24px;
  }
  .timeline-phase::before {
    content: "";
    position: absolute;
    left: -24px;
    top: 6px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--accent-light);
  }
  .timeline-phase h3 {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .timeline-commits {
    list-style: none;
    padding: 0;
  }
  .timeline-commits li {
    font-size: 0.8rem;
    color: var(--text-muted);
    padding: 2px 0;
    font-family: var(--font-mono);
  }
  .timeline-commits .hash {
    color: var(--accent);
    margin-right: 6px;
  }

  /* — Files changed — */
  .files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .file-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .file-group h3 {
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .file-group .count {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* — Worth knowing — */
  .discoveries {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .discovery {
    background: var(--accent-light);
    border: 1px solid #c7d2fe;
    border-radius: var(--radius);
    padding: 20px 24px;
  }
  .discovery h3 {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .discovery p {
    font-size: 0.9rem;
    margin-bottom: 10px;
  }

  /* — Convention changes (diff) — */
  .convention-diff {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .convention-diff-header {
    background: var(--bg);
    padding: 10px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .convention-diff pre {
    padding: 12px 16px;
    font-size: 0.8rem;
    overflow-x: auto;
    line-height: 1.5;
  }
  .diff-add { color: var(--green); }
  .diff-remove { color: var(--red); }

  /* — Diff stats — */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }

  /* — Code blocks — */
  pre.code-block {
    background: var(--code-bg);
    color: var(--code-text);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    line-height: 1.6;
    overflow-x: auto;
    position: relative;
  }

  /* — File path with copy — */
  .file-path {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .file-path:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .file-path .copy-icon {
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }
  .file-path:hover .copy-icon { opacity: 1; }
  .file-path.copied {
    border-color: var(--green);
    color: var(--green);
  }

  /* — Empty state — */
  .empty {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-style: italic;
  }

  /* — Responsive — */
  @media (max-width: 640px) {
    body { padding: 24px 16px 64px; }
    .learning-comparison { grid-template-columns: 1fr; }
    .stats-bar { flex-wrap: wrap; gap: 16px; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <h1><!-- SLOT:title --></h1>
  <div class="header-meta">
    <!-- SLOT:header_pills -->
  </div>
</header>

<!-- ===== NARRATIVE ===== -->
<section class="narrative">
  <h2>Summary</h2>
  <!-- SLOT:narrative -->
</section>

<!-- ===== KEY DECISIONS ===== -->
<section>
  <h2>Key Decisions</h2>
  <div class="decisions-grid">
    <!-- SLOT:decisions -->
  </div>
</section>

<!-- ===== LEARNINGS ===== -->
<section>
  <h2>Learnings</h2>
  <div class="learnings-list">
    <!-- SLOT:learnings -->
  </div>
</section>

<!-- ===== WORK TIMELINE ===== -->
<section>
  <h2>Work Timeline</h2>
  <div class="timeline">
    <!-- SLOT:timeline -->
  </div>
</section>

<!-- ===== FILES CHANGED ===== -->
<section>
  <h2>Files Changed</h2>
  <div class="files-grid">
    <!-- SLOT:files -->
  </div>
</section>

<!-- ===== WORTH KNOWING ===== -->
<section>
  <h2>Worth Knowing</h2>
  <div class="discoveries">
    <!-- SLOT:discoveries -->
  </div>
</section>

<!-- ===== CONVENTION CHANGES ===== -->
<section>
  <h2>Convention Changes</h2>
  <!-- SLOT:conventions -->
</section>

<!-- ===== DIFF STATS ===== -->
<section>
  <h2>Diff Stats</h2>
  <!-- SLOT:stats -->
</section>

<script>
  function copyPath(el) {
    const label = el.querySelector('.copy-label');
    const text = label ? label.textContent : el.getAttribute('data-path');
    const originalText = text;
    navigator.clipboard.writeText(text).then(() => {
      el.classList.add('copied');
      if (label) label.textContent = 'copied';
      setTimeout(() => {
        el.classList.remove('copied');
        if (label) label.textContent = originalText;
      }, 1500);
    });
  }

  document.addEventListener('click', (e) => {
    const fp = e.target.closest('.file-path');
    if (fp) copyPath(fp);
  });
</script>

</body>
</html>
